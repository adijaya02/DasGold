<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Emas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#eef2f7;
}

.dashboard{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:260px;
    background:#04264a;
    color:#fff;
    padding:25px 0;
    transition:all .3s ease;
    overflow:hidden;
}

.sidebar.hide{
    width:0;
    padding:0;
}

.logo{
    font-size:28px;
    font-weight:700;
    text-align:center;
    margin-bottom:40px;
    white-space:nowrap;
}

.menu{
    list-style:none;
}

.menu li{
    transition:.3s;
}

.menu li:hover{
    background:#0b4f96;
}

.menu li.active{
    background:#1f86ff;
}

.menu li a{
    display:block;
    padding:16px 30px;
    color:#fff;
    text-decoration:none;
}

/* MAIN */

.main{
    flex:1;
    transition:all .3s ease;
}

/* TOPBAR */

.topbar{
    height:75px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.left-top{
    font-size:26px;
    cursor:pointer;
    user-select:none;
}

.right-top{
    display:flex;
    align-items:center;
    gap:15px;
}

.logout-btn{
    background:#ff4d4d;
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.logout-btn:hover{
    background:#e60000;
}

/* CONTENT */

.content{
	padding:30px;
}

.purchase-card{
    background:#fff;
    border-radius:20px;
    padding:35px;
    max-width:1400px;
    margin:auto;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.header-form{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.tanggal-display{
    display:flex;
    align-items:center;
    gap:10px;
}

#tanggalText{
    font-size:24px;
    font-weight:600;
    color:#04264a;
}

#calendarBtn{
    border:none;
    background:none;
    cursor:pointer;
    font-size:22px;
}

.header-form h1{
    color:#04264a;
    font-size:32px;
}

.header-form input{
    width:220px;
}

.price-boxes{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    margin-bottom:30px;
}

.price-card{
    border:2px solid #d9e1ec;
    border-radius:14px;
    padding:20px;
}

.manual-price{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.manual-price input{
    flex:1;
    min-width:180px;
    padding:10px;
    border:1px solid #d9e1ec;
    border-radius:10px;
}

.manual-price button{
    border:none;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

#editHargaBtn{
    background:#1f86ff;
    color:white;
}

#saveHargaBtn{
    background:#14b85a;
    color:white;
}

#resetHargaBtn{
    background:#e2e8f0;
}

.price-card h3{
    margin-bottom:15px;
    color:#04264a;
}

.card-value{
    font-size:34px;
    font-weight:700;
    margin-top:10px;
    color:#1f86ff;
}


.calculator-box{
    border:2px solid #d9e1ec;
    border-radius:15px;
    overflow:hidden;
    margin-bottom:25px;
}

.tab-menu{
    display:flex;
}

.tab-btn{
    flex:1;
    padding:18px;
    border:none;
    background:#eef2f7;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
}

.tab-btn.active{
    background:#1f86ff;
    color:#fff;
}

.tab-content{
    padding:25px;
}

.tab-content input{
    width:100%;
    padding:15px;
    border:1px solid #d6dce5;
    border-radius:10px;
    font-size:16px;
}

.quick-buttons{
    display:flex;
	flex-wrap:wrap;
    gap:12px;
    padding:7px;
    border-top:1px solid #d9e1ec;
}

.quick-buttons button{
	min-width:70px;
    height:70px;
    border-radius:50%;
    border:none;
    background:#1f86ff;
    color:white;
    padding:12px 25px;
    border-radius:30px;
    cursor:pointer;
    font-weight:600;
}


.total-box{
    border:2px solid #d9e1ec;
    border-radius:14px;
    text-align:center;
    padding:25px;
}

.total-title{
    font-size:20px;
    font-weight:600;
    margin-bottom:10px;
}

.total-value{
    font-size:42px;
    font-weight:700;
    color:#04264a;
}

.action-buttons{
    display:flex;
    justify-content:flex-end;
    gap:20px;
    margin-top:30px;
}

.save-btn,
.reset-btn{
    border:none;
    padding:15px 40px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

.save-btn{
    background:#1f86ff;
    color:#fff;
}

.reset-btn{
    background:#e2e8f0;
}

/* =========================
   TABLET
========================= */
@media (max-width: 1200px){

    .stats{
        grid-template-columns: repeat(2,1fr);
    }

    .chart-area{
        grid-template-columns: 1fr;
    }

}

/* =========================
   MOBILE
========================= */
@media (max-width: 768px){

    .dashboard{
        flex-direction: column;
    }

    /* Sidebar muncul sebagai drawer */
    .sidebar{
        position: fixed;
        left: 0;
        top: 0;
        height: 100%;
        z-index: 1000;
        width: 240px;
        box-shadow: 0 0 20px rgba(0,0,0,.2);
    }

    .sidebar.hide{
        transform: translateX(-100%);
        width: 240px;
    }

    .main{
        width:100%;
    }

    .topbar{
        padding:0 15px;
    }

    .content{
        padding:15px;
    }

    /* Card menjadi 1 kolom */
    .stats{
        grid-template-columns:1fr;
        gap:15px;
    }

    .card{
        padding:16px;
    }

    .card-value{
        font-size:28px;
    }

    /* Header panel turun ke bawah */
    .panel-header{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }

    .tabs{
        width:100%;
    }

    .filter{
        width:100%;
        flex-wrap:wrap;
    }

    .filter button{
        flex:1;
        min-width:90px;
    }

    .chart-area{
        grid-template-columns:1fr;
        gap:15px;
    }

    .chart-box{
        height:250px;
        font-size:15px;
    }

    .ranking{
        padding:15px;
    }

    .rank-item{
        font-size:14px;
    }

}

/* =========================
   EXTRA SMALL DEVICE
========================= */
@media (max-width: 480px){

    .logo{
        font-size:22px;
    }

    .topbar{
        height:65px;
    }

    .left-top{
        font-size:24px;
    }

    .card-title{
        font-size:13px;
    }

    .card-value{
        font-size:24px;
    }

    .card-sub{
        font-size:12px;
    }

    .panel{
        padding:15px;
    }

    .ranking h3{
        font-size:16px;
    }

}

@media (max-width:768px){

    .sidebar{
        position:fixed;
        top:0;
        left:0;
        width:220px;
        height:100vh;
        z-index:1001;
        transform:translateX(-100%);
        transition:.3s;
        box-shadow:0 0 25px rgba(0,0,0,.25);
    }

    .sidebar.show{
        transform:translateX(0);
    }

    .logo{
        font-size:24px;
        margin-bottom:25px;
    }

    .menu li a{
        padding:14px 20px;
        font-size:15px;
    }

    .main{
        width:100%;
    }

    .content{
        padding:12px;
    }

    .stats{
        grid-template-columns:1fr;
        gap:12px;
    }

    .card{
        padding:16px;
    }

    .card-value{
        font-size:24px;
    }

    .panel{
        padding:15px;
    }

    .panel-header{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }

    .chart-area{
        grid-template-columns:1fr;
    }

    .chart-box{
        height:220px;
    }

}

#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
    z-index:1000;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}

#overlay.show{
    opacity:1;
    visibility:visible;
}

.main{
    transition:.3s;
}

@media(max-width:768px){

    .header-form{
        flex-direction:column;
        gap:15px;
        align-items:flex-start;
    }

    .price-boxes{
        grid-template-columns:1fr;
    }

    .table-header,
    .table-row{
        grid-template-columns:1fr;
    }

    .action-buttons{
        justify-content:center;
        flex-wrap:wrap;
    }

    .total-value{
        font-size:30px;
    }

}
@media(max-width:768px){

    .quick-buttons{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:12px;
    }

    .quick-buttons button{
        width:100%;
        height:65px;
        border-radius:15px;
    }

}

</style>
</head>

<body>

<div id="overlay"></div>

<div class="dashboard">

    <aside class="sidebar" id="sidebar">

        <div class="logo">
            GoldDash
        </div>

        <ul class="menu">
            <li>
                <a href="dashboard.html">Dashboard</a>
            </li>

            <li>
                <a href="harga-emas.html">Harga Emas</a>
            </li>

            <li>
                <a href="data-emas.html">Data Emas</a>
            </li>

            <li class="active">
                <a href="investasi.html">Investasi</a>
            </li>           
        </ul>

    </aside>

    <main class="main">

        <div class="topbar">

            <div class="left-top" id="toggleSidebar">
                ☰
            </div>

		<div class="right-top">
			<button class="logout-btn" onclick="logout()">
				Logout
			</button>
		</div>

        </div>
	
		 <div class="content">

			<div class="purchase-card">

				<div class="header-form">
					<h1>Form Pembelian Emas</h1>
					<div class="tanggal-display">
						<span id="tanggalText"></span>
						<button id="calendarBtn">
							📅
						</button>
						<input
							type="date"
							id="tanggalPembelian"
							hidden>
					</div>
				</div>

				<div class="price-boxes">

					<div class="price-card">
					    <h3>Harga 0.01 Gram</h3>
					    <div class="card-value" id="hargaBeli">
					        Loading...
					    </div>
					    <div class="manual-price">
					        <input
					            type="number"
					            id="manualHarga"
					            placeholder="Masukkan harga manual"
					            style="display:none;">
					        <button id="editHargaBtn">
					            Edit Manual
					        </button>
					        <button
					            id="saveHargaBtn"
					            style="display:none;">
					            Simpan
							</button>
					        <button
					            id="resetHargaBtn"
					            style="display:none;">
					            Auto
					        </button>
						</div>
					</div>

					<div class="price-card">
					    <h3>Harga 1 Gram</h3>
					    <div class="card-value" id="harga1Gram">Loading...</div>
					</div>
				</div>

        <div class="calculator-box">

    <div class="tab-menu">

        <button class="tab-btn active" id="tabGram">
            Gram
        </button>

        <button class="tab-btn" id="tabHarga">
            Harga
        </button>

    </div>

    <div class="tab-content">

        <div id="gramSection">

            <input
                type="number"
                id="gramInput"
                placeholder="Masukkan gram">

            <div class="quick-buttons">

                <button onclick="setGram(1)">
                    1 gr
                </button>

                <button onclick="setGram(3)">
                    3 gr
                </button>

                <button onclick="setGram(5)">
                    5 gr
                </button>
				
				<button onclick="setGram(10)">
                    10 gr
                </button>

            </div>

        </div>

        <div id="hargaSection" style="display:none;">

            <input
                type="number"
                id="hargaInput"
                placeholder="Masukkan nominal">

            <div class="quick-buttons">

                <button onclick="setHarga(100000)">
                    100rb
                </button>

                <button onclick="setHarga(500000)">
                    500rb
                </button>

                <button onclick="setHarga(1000000)">
                    1jt
                </button>
				
				<button onclick="setHarga(10000000)">
                    10jt
                </button>              
            </div>

        </div>

    </div>

</div>

        <div class="total-box">

            <div class="total-title">
                Total
            </div>

            <div class="total-value" id="totalText">
                Rp 0
            </div>

        </div>

        <div class="action-buttons">

            <button class="save-btn" id="saveBtn">
			    Simpan Data
			</button>
			
			<button class="reset-btn" id="resetBtn">
			    Reset
			</button>
        </div>

    </div>

</div>
	</main>
</div>

<script>
	let hargaPerGram = 0;
	let hargaDatabase = 0;
	let manualMode = false;

	async function loadHarga() {

	    try {
	
	        const res = await fetch('/api/harga');
	        const data = await res.json();
	
	        if (!data || !data.harga_beli) return;
	
	        hargaDatabase = Number(data.harga_beli);
	
	        if (!manualMode) {
	
	            hargaPerGram = hargaDatabase * 100;
	
	            document.getElementById('hargaBeli').innerText =
	                'Rp ' +
	                hargaDatabase.toLocaleString('id-ID');
	
	            document.getElementById('harga1Gram').innerText =
	                'Rp ' +
	                hargaPerGram.toLocaleString('id-ID');
	        }
	
	    } catch(err){
	
	        console.error(err);
	
	    }
	
	}
	
	loadHarga();

	const manualInput =
	document.getElementById("manualHarga");
	
	const editBtn =
	document.getElementById("editHargaBtn");
	
	const saveBtnHarga =
	document.getElementById("saveHargaBtn");
	
	const resetBtnHarga =
	document.getElementById("resetHargaBtn");
	
	
	editBtn.addEventListener("click",()=>{
	
	    manualInput.style.display="block";
	
	    saveBtnHarga.style.display="inline-block";
	
	    resetBtnHarga.style.display="inline-block";
	
	});
	
	
	saveBtnHarga.addEventListener("click",()=>{
	
	    const manual =
	        Number(manualInput.value);
	
	    if(manual <= 0){
	
	        alert("Masukkan harga valid");
	        return;
	
	    }
	
	    manualMode = true;
	
	    document.getElementById(
	        "hargaBeli"
	    ).innerText =
	        "Rp " +
	        manual.toLocaleString("id-ID");
	
	    hargaPerGram =
	        manual * 100;
	
	    document.getElementById(
	        "harga1Gram"
	    ).innerText =
	        "Rp " +
	        hargaPerGram.toLocaleString("id-ID");
	
	});


	resetBtnHarga.addEventListener("click",()=>{
	
	    manualMode = false;
	
	    manualInput.value="";
	
	    manualInput.style.display="none";
	
	    saveBtnHarga.style.display="none";
	
	    resetBtnHarga.style.display="none";
	
	    loadHarga();
	
	});
	
	const toggleBtn = document.getElementById('toggleSidebar');
	const sidebar = document.getElementById('sidebar');
	const overlay = document.getElementById('overlay');

	toggleBtn.addEventListener('click', () => {

		if(window.innerWidth <= 768){
			sidebar.classList.toggle('show');
			overlay.classList.toggle('show');
		} else {
			sidebar.classList.toggle('hide');
		}

	});

	overlay.addEventListener('click', () => {

		sidebar.classList.remove('show');
		overlay.classList.remove('show');

	});
	
	const tanggalInput =
	document.getElementById('tanggalPembelian');

	const tanggalText =
	document.getElementById('tanggalText');

	function formatTanggal(value){

		const date = new Date(value);

		tanggalText.textContent =
		date.toLocaleDateString('id-ID',{
			day:'numeric',
			month:'long',
			year:'numeric'
		});
	}

	const today = new Date();

	tanggalInput.value =
	today.toISOString().split('T')[0];

	formatTanggal(tanggalInput.value);

	tanggalInput.addEventListener('change',()=>{
		formatTanggal(tanggalInput.value);
	});

	document.getElementById('calendarBtn')
	.addEventListener('click',()=>{
		tanggalInput.showPicker();
	});

	const tabGram = document.getElementById("tabGram");
	const tabHarga = document.getElementById("tabHarga");

	const gramSection = document.getElementById("gramSection");
	const hargaSection = document.getElementById("hargaSection");

	tabGram.addEventListener("click",()=>{

		tabGram.classList.add("active");
		tabHarga.classList.remove("active");

		gramSection.style.display="block";
		hargaSection.style.display="none";

	});

	tabHarga.addEventListener("click",()=>{

		tabHarga.classList.add("active");
		tabGram.classList.remove("active");

		gramSection.style.display="none";
		hargaSection.style.display="block";

	});

	
	function hitungTotal() {
	    const gram = parseFloat(gramInput.value) || 0;
	
	    const total = gram * hargaPerGram;
	
	    document.getElementById("totalText").innerHTML =
	        "Rp " + total.toLocaleString("id-ID");
	}
		
	const gramInput = document.getElementById("gramInput");
	const hargaInput = document.getElementById("hargaInput");

	hargaInput.addEventListener("input",()=>{

		const harga = parseFloat(hargaInput.value) || 0;

		const gram = harga / hargaPerGram;

		document.getElementById("totalText").innerHTML =
			gram.toFixed(4) + " gram";

	});
	
	gramInput.addEventListener('input', hitungTotal);

	function setGram(value){

		gramInput.value = value;

		gramInput.dispatchEvent(
			new Event('input')
		);
	}
	
	function setHarga(value){

		hargaInput.value = value;

		hargaInput.dispatchEvent(
			new Event('input')
		);
	}

	function logout(){
		// kalau pakai login sederhana, langsung redirect
		window.location.href = "login.html";
	}

	document.addEventListener("DOMContentLoaded", () => {

	    const saveBtn = document.getElementById("saveBtn");
	    const resetBtn = document.getElementById("resetBtn");
	
	    saveBtn.addEventListener("click", simpanData);
	
	    resetBtn.addEventListener("click", resetForm);
	
	});
	
	async function simpanData() {

	    let biayaPembelian = 0;
	    let aset = 0;
	
	    const isGramMode =
	        document.getElementById("gramSection").style.display !== "none";
	
	    if (isGramMode) {
	
	        aset = parseFloat(gramInput.value) || 0;
	        biayaPembelian = aset * hargaPerGram;
	
	    } else {
	
	        biayaPembelian = parseFloat(hargaInput.value) || 0;
	        aset = biayaPembelian / hargaPerGram;
	    }
	
	    if (biayaPembelian <= 0 || aset <= 0) {
	        alert("Input tidak valid");
	        return;
	    }
	
	    try {
	
	        const response = await fetch("/api/simpan-investasi", {
	            method: "POST",
	            headers: {
	                "Content-Type": "application/json"
	            },
	            body: JSON.stringify({
	                biaya_pembelian: biayaPembelian,
	                aset: aset
	            })
	        });
	
	        const result = await response.json();
	
	        if (response.ok) {
	            alert("Data berhasil disimpan");
	            resetForm();
	        } else {
	            console.error(result);
	            alert("Gagal menyimpan data");
	        }
	
	    } catch (err) {
	        console.error(err);
	        alert("Server error");
	    }
	}
	
	function resetForm() {

	    gramInput.value = "";
	    hargaInput.value = "";
	    document.getElementById("totalText").innerHTML = "Rp 0";
	
	}
</script>


</body>
</html>
