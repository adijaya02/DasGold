<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Emas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

	*{
		margin:0;
		padding:0;
		box-sizing:border-box;
		font-family:'Poppins',sans-serif;
	}

	body{
		background:#eef2f7;
	}

	.dashboard{
		display:flex;
		min-height:100vh;
	}

	/* SIDEBAR */

	.sidebar{
		width:260px;
		background:#04264a;
		color:#fff;
		padding:25px 0;
		transition:all .3s ease;
		overflow:hidden;
	}

	.sidebar.hide{
		width:0;
		padding:0;
	}

	.logo{
		font-size:28px;
		font-weight:700;
		text-align:center;
		margin-bottom:40px;
		white-space:nowrap;
	}

	.menu{
		list-style:none;
	}

	.menu li{
		transition:.3s;
	}

	.menu li:hover{
		background:#0b4f96;
	}

	.menu li.active{
		background:#1f86ff;
	}

	.menu li a{
		display:block;
		padding:16px 30px;
		color:#fff;
		text-decoration:none;
	}

	/* MAIN */

	.main{
		flex:1;
		transition:all .3s ease;
	}

	/* TOPBAR */

	.topbar{
		height:75px;
		background:#fff;
		display:flex;
		align-items:center;
		justify-content:space-between;
		padding:0 30px;
		box-shadow:0 2px 10px rgba(0,0,0,.05);
	}

	.left-top{
		font-size:26px;
		cursor:pointer;
		user-select:none;
	}

	.right-top{
		display:flex;
		align-items:center;
		gap:15px;
	}

	.logout-btn{
		background:#ff4d4d;
		color:#fff;
		border:none;
		padding:10px 16px;
		border-radius:10px;
		cursor:pointer;
		font-weight:600;
		transition:.3s;
	}

	.logout-btn:hover{
		background:#e60000;
	}

	/* HISTORY TABLE */

	.table-container{
		margin-top:25px;
		background:#fff;
		border-radius:14px;
		padding:20px;
		box-shadow:0 4px 15px rgba(0,0,0,.05);
		overflow-x:auto;
	}

	.table-title{
		font-size:18px;
		font-weight:600;
		margin-bottom:15px;
		color:#1b1b1b;
	}

	.history-table{
		width:100%;
		border-collapse:collapse;
	}

	.history-table td{
		padding:14px;
		border-bottom:1px solid #e5e5e5;
		font-size:14px;
	}

	.history-table tr:hover{
		background:#f7f9fc;
	}

@media(max-width:768px){

    .history-table th,
    .history-table td{
        padding:10px;
        font-size:13px;
    }

}
	.loss{
    color:#e53935;
    font-weight:600;
	}

	.profit{
    color:#16a34a;
    font-weight:600;
	}

/* =========================
   TABLET
========================= */
@media (max-width: 1200px){

    .stats{
        grid-template-columns: repeat(2,1fr);
    }

    .chart-area{
        grid-template-columns: 1fr;
    }

}

/* =========================
   MOBILE
========================= */
@media (max-width: 768px){

    .dashboard{
        flex-direction: column;
    }

    /* Sidebar muncul sebagai drawer */
    .sidebar{
        position: fixed;
        left: 0;
        top: 0;
        height: 100%;
        z-index: 1000;
        width: 240px;
        box-shadow: 0 0 20px rgba(0,0,0,.2);
    }

    .sidebar.hide{
        transform: translateX(-100%);
        width: 240px;
    }

    .main{
        width:100%;
    }

    .topbar{
        padding:0 15px;
    }

    .content{
        padding:15px;
    }

    /* Card menjadi 1 kolom */
    .stats{
        grid-template-columns:1fr;
        gap:15px;
    }

    .card{
        padding:16px;
    }

    .card-value{
        font-size:28px;
    }

    /* Header panel turun ke bawah */
    .panel-header{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }

    .tabs{
        width:100%;
    }

    .filter{
        width:100%;
        flex-wrap:wrap;
    }

    .filter button{
        flex:1;
        min-width:90px;
    }

    .chart-area{
        grid-template-columns:1fr;
        gap:15px;
    }

    .chart-box{
        height:250px;
        font-size:15px;
    }

    .ranking{
        padding:15px;
    }

    .rank-item{
        font-size:14px;
    }

}

/* =========================
   EXTRA SMALL DEVICE
========================= */
@media (max-width: 480px){

    .logo{
        font-size:22px;
    }

    .topbar{
        height:65px;
    }

    .left-top{
        font-size:24px;
    }

    .card-title{
        font-size:13px;
    }

    .card-value{
        font-size:24px;
    }

    .card-sub{
        font-size:12px;
    }

    .panel{
        padding:15px;
    }

    .ranking h3{
        font-size:16px;
    }

}

@media (max-width:768px){

    .sidebar{
        position:fixed;
        top:0;
        left:0;
        width:220px;
        height:100vh;
        z-index:1001;
        transform:translateX(-100%);
        transition:.3s;
        box-shadow:0 0 25px rgba(0,0,0,.25);
    }

    .sidebar.show{
        transform:translateX(0);
    }

    .logo{
        font-size:24px;
        margin-bottom:25px;
    }

    .menu li a{
        padding:14px 20px;
        font-size:15px;
    }

    .main{
        width:100%;
    }

    .content{
        padding:12px;
    }

    .stats{
        grid-template-columns:1fr;
        gap:12px;
    }

    .card{
        padding:16px;
    }

    .card-value{
        font-size:24px;
    }

    .panel{
        padding:15px;
    }

    .panel-header{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }

    .chart-area{
        grid-template-columns:1fr;
    }

    .chart-box{
        height:220px;
    }
}

	#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.45);
    z-index:1000;
    opacity:0;
    visibility:hidden;
    transition:.3s;
	}

	#overlay.show{
    opacity:1;
    visibility:visible;
	}

	.main{
    transition:.3s;
	}
	.profit{
	color:#1b8a3f;
	font-weight:600;
	}

	.loss{
	color:#d32f2f;
	font-weight:600;
	}
	
	.history-table{
	width:100%;
	border-collapse:collapse;
	}
	
	.history-table th,
	.history-table td{
	padding:12px;
	text-align:center;
	}

	/* halaman tidak ikut scroll */
	body{
	height:100vh;
	overflow:hidden;
	}

/* container */
	.table-container{
	height:calc(100vh - 120px);
	display:flex;
	flex-direction:column;
	overflow:hidden;
	}

/* hanya isi tabel yang scroll */
	.table-wrapper{
	flex:1;
	overflow-y:auto;
	overflow-x:auto;
	border:1px solid #ddd;
	border-radius:10px;
	}

/* =========================
   TABLE HEADER
========================= */
.history-table{
width:100%;
border-collapse:collapse;
}

/* header tabel */
.history-table thead th{
position:sticky;
top:0;
background:#04264a !important;
color:#ffffff !important;
z-index:100;
padding:14px;
text-align:center;
font-size:14px;
font-weight:600;
border-bottom:1px solid #0b4f96;
}

/* isi tabel */
.history-table tbody td{
padding:14px;
background:#ffffff;
border-bottom:1px solid #e5e5e5;
text-align:center;
white-space:nowrap;
}

/* hover */
.history-table tbody tr:hover{
background:#f7f9fc;
}

/* scroll */
.table-wrapper{
flex:1;
overflow:auto;
border-radius:10px;
}

	.history-table{
	width:100%;
	border-collapse:collapse;
	}

	.history-table th,
	.history-table td{
	padding:14px;
	white-space:nowrap;
	}

/* pagination */
	.pagination{
	display:flex;
	justify-content:center;
	gap:10px;
	padding:15px;
	}

	.pagination button{
	padding:8px 14px;
	border:none;
	border-radius:8px;
	cursor:pointer;
	}


.pagination button.active{
background:#04264a;
color:white;
}

</style>
</head>

<body>

<div id="overlay"></div>

<div class="dashboard">

   <aside class="sidebar" id="sidebar">

	    <div class="logo">
	        GoldDash
	    </div>
	
	    <ul class="menu">
	
	        <li>
	            <a href="dashboard.html">
	                Dashboard
	            </a>
	        </li>
	
	        <li>
	            <a href="harga-emas.html">
	                Harga Emas
	            </a>
	        </li>
	
	        <li class="active">
	            <a href="data-emas.html">
	                Data Emas
	            </a>
	        </li>
	
	        <li>
	            <a href="investasi.html">
	                Investasi
	            </a>
	        </li>
	
	    </ul>
	
	</aside>
	
	
	<main class="main">
	
	    <div class="topbar">
	
	        <div
	            class="left-top"
	            id="toggleSidebar">
	
	            ☰
	
	        </div>
	
	        <div class="right-top">
	
	            <button
	                class="logout-btn"
	                onclick="logout()">
	
	                Logout
	
	            </button>
	
	        </div>
	
	    </div>
	
	
	  <div class="table-container">

<div class="table-title">
History Aset Emas
</div>

<div class="table-wrapper">

<table class="history-table">

<thead>

<tr>

<th>No</th>
<th>Hari / Tanggal</th>
<th>Harga Beli</th>
<th>Biaya Pembelian</th>
<th>Total Modal</th>
<th>Aset</th>
<th>Total Aset</th>
<th>Harga Jual</th>
<th>Jumlah Uang di Aplikasi</th>
<th>Untung/Rugi</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div
class="pagination"
id="pagination"
></div>

</div>
	
	    </div>
	
	</main>

</div>

<script>
	const profitLossCells = document.querySelectorAll('.profit-loss');

		profitLossCells.forEach(cell => {

			const text = cell.textContent.trim();

			if(text.includes('-')){
				cell.classList.add('loss');
			} else {
				cell.classList.add('profit');
			}

	});
	
	const toggleBtn = document.getElementById('toggleSidebar');
	const sidebar = document.getElementById('sidebar');
	const overlay = document.getElementById('overlay');

	toggleBtn.addEventListener('click', () => {

		if(window.innerWidth <= 768){
			sidebar.classList.toggle('show');
			overlay.classList.toggle('show');
		} else {
			sidebar.classList.toggle('hide');
		}

	});

	overlay.addEventListener('click', () => {

		sidebar.classList.remove('show');
		overlay.classList.remove('show');

	});
	
	function logout(){
		// kalau pakai login sederhana, langsung redirect
		window.location.href = "login.html";
	}

	const tbody =
	document.getElementById(
	"tableBody"
	);
	
	const data = [];
	
	tbody.innerHTML =
	data.length
	? data.map(
	(item,index)=>{
	
	const className =
	item.untung_rugi >= 0
	? "profit"
	: "loss";
	
	return `
	<tr>
	
	<td>
	${index+1}
	</td>
	
	<td>
	${item.tanggal}
	</td>
	
	<td>
	Rp ${Number(
	item.harga_beli
	).toLocaleString("id-ID")}
	</td>
	
	<td>
	Rp ${Number(
	item.biaya_pembelian
	).toLocaleString("id-ID")}
	</td>
	
	<td>
	Rp ${Number(
	item.total_modal
	).toLocaleString("id-ID")}
	</td>
	
	<td>
	${item.aset}
	</td>
	
	<td>
	${item.total_aset}
	</td>
	
	<td>
	Rp ${Number(
	item.harga_jual
	).toLocaleString("id-ID")}
	</td>
	
	<td>
	Rp ${Number(
	item.jumlah_uang_aplikasi
	).toLocaleString("id-ID")}
	</td>
	
	<td class="${className}">
	Rp ${Number(
	item.untung_rugi
	).toLocaleString("id-ID")}
	</td>
	
	</tr>
	`;
	
	}).join("")
	
	:
	
	`
	<tr>
	
	<td colspan="10">
	
	Belum ada data
	
	</td>
	
	</tr>
	`;

let allData=[];

let currentPage=1;

const rowsPerPage=10;



function formatRupiah(v){

return Number(
Math.round(v||0)
)
.toLocaleString(
"id-ID"
);

}


function formatGram(v){

return Number(
v||0
)
.toFixed(4)
.replace(".",",");

}


function formatTanggal(v){

return new Date(v)
.toLocaleDateString(
"id-ID",
{
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
}
);

}



function renderTable(){

const start=
(currentPage-1)
*
rowsPerPage;

const end=
start+
rowsPerPage;

const rows=
allData.slice(
start,
end
);

document
.getElementById(
"tableBody"
)
.innerHTML=

rows.map(
(item,index)=>`

<tr>

<td>
${start+index+1}
</td>

<td>
${formatTanggal(
item.tanggal_aset
)}
</td>

<td>
Rp ${formatRupiah(item.harga_beli)}
</td>

<td>
Rp ${formatRupiah(item.biaya_pembelian)}
</td>

<td>
Rp ${formatRupiah(item.total_modal)}
</td>

<td>
${formatGram(item.aset)}
</td>

<td>
${formatGram(item.total_aset)}
</td>

<td>
Rp ${formatRupiah(item.harga_jual)}
</td>

<td>
Rp ${formatRupiah(item.jumlah_uang_aplikasi)}
</td>

<td
class="${
item.untung_rugi>=0
?
"profit"
:
"loss"
}"
>

Rp ${formatRupiah(
item.untung_rugi
)}

</td>

</tr>

`

).join("");

renderPagination();

}



function renderPagination(){

const total=
Math.ceil(
allData.length
/
rowsPerPage
);

const div=
document
.getElementById(
"pagination"
);

div.innerHTML="";


for(
let i=1;
i<=total;
i++
){

div.innerHTML+=`

<button

class="${
i===currentPage
?
"active"
:
""
}"

onclick="
changePage(
${i}
)
"

>

${i}

</button>

`;

}

}



function changePage(page){

currentPage=
page;

renderTable();

}



async function loadData(){

await fetch(
"/api/generate-data-aset"
);

const res=
await fetch(
"/api/data-aset"
);

allData=
await res.json();


// terbaru di page 1
allData.sort(

(a,b)=>

new Date(
b.tanggal_aset
)

-

new Date(
a.tanggal_aset
)

);

renderTable();

}


loadData();

	
</script>


</body>
</html>
