<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Emas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#eef2f7;
}

/* =========================
   LAYOUT
========================= */

.dashboard{
    display:flex;
    min-height:100vh;
}

/* =========================
   SIDEBAR
========================= */

.sidebar{
    position:fixed;
    left:0;
    top:0;

    width:260px;
    height:100vh;

    background:#04264a;
    color:#fff;

    padding:25px 0;

    overflow-y:auto;

    transition:.3s;

    z-index:1000;
}

.sidebar.hide{
    width:0;
    padding:0;
}

.logo{
    font-size:28px;
    font-weight:700;
    text-align:center;
    margin-bottom:40px;
}

.menu{
    list-style:none;
}

.menu li:hover{
    background:#0b4f96;
}

.menu li.active{
    background:#1f86ff;
}

.menu li a{
    display:block;
    padding:16px 30px;

    color:#fff;

    text-decoration:none;
}

/* =========================
   MAIN
========================= */

.main{
    flex:1;

    margin-left:260px;

    min-height:100vh;

    transition:.3s;
}

.sidebar.hide + .main{
    margin-left:0;
}

/* =========================
   TOPBAR
========================= */

.topbar{

    position:sticky;

    top:0;

    z-index:900;

    height:75px;

    background:#fff;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 30px;

    box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.left-top{

    font-size:26px;

    cursor:pointer;

}

.right-top{

    display:flex;

    align-items:center;

}

.logout-btn{

    background:#ff4d4d;

    color:white;

    border:none;

    padding:10px 16px;

    border-radius:10px;

    cursor:pointer;

}

.logout-btn:hover{

    background:#e60000;

}

/* =========================
   TABLE
========================= */

.table-container{

    margin:25px;

    background:#fff;

    border-radius:14px;

    padding:20px;

    box-shadow:0 4px 15px rgba(0,0,0,.05);

}

.table-title{

    font-size:20px;

    font-weight:600;

    margin-bottom:20px;

}

.table-wrapper{

    overflow-x:auto;

}

.history-table{

    width:100%;

    border-collapse:collapse;

}

.history-table thead th{

    position:sticky;

    top:75px;

    background:#04264a;

    color:white;

    padding:14px;

    text-align:center;

    font-size:14px;

    z-index:100;

}

.history-table tbody td{

    padding:14px;

    text-align:center;

    border-bottom:1px solid #eee;

    white-space:nowrap;

}

.history-table tbody tr:hover{

    background:#f7f9fc;

}

/* =========================
   PROFIT LOSS
========================= */

.profit{

    color:#1b8a3f;

    font-weight:600;

}

.loss{

    color:#d32f2f;

    font-weight:600;

}

/* =========================
   PAGINATION
========================= */

.pagination{

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:10px;

    margin-top:20px;

}

.pagination button{

    border:none;

    background:#e6e6e6;

    padding:10px 14px;

    border-radius:8px;

    cursor:pointer;

}

.pagination button.active{

    background:#04264a;

    color:white;

}

/* =========================
   OVERLAY
========================= */

#overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.4);

    opacity:0;

    visibility:hidden;

    transition:.3s;

}

#overlay.show{

    opacity:1;

    visibility:visible;

}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

.sidebar{

transform:translateX(-100%);

width:240px;

}

.sidebar.show{

transform:translateX(0);

}

.main{

margin-left:0;

}

.topbar{

padding:0 15px;

}

.table-container{

margin:15px;

padding:15px;

}

.history-table th,

.history-table td{

padding:10px;

font-size:13px;

}

}
</style>
</head>

<body>

<div id="overlay"></div>

<div class="dashboard">

   <aside class="sidebar" id="sidebar">

	    <div class="logo">
	        GoldDash
	    </div>
	
	    <ul class="menu">
	
	        <li>
	            <a href="dashboard.html">
	                Dashboard
	            </a>
	        </li>
	
	        <li>
	            <a href="harga-emas.html">
	                Harga Emas
	            </a>
	        </li>
	
	        <li class="active">
	            <a href="data-emas.html">
	                Data Emas
	            </a>
	        </li>
	
	        <li>
	            <a href="investasi.html">
	                Investasi
	            </a>
	        </li>
	
	    </ul>
	
	</aside>
	
	
	<main class="main">
	
	    <div class="topbar">
	
	        <div
	            class="left-top"
	            id="toggleSidebar">
	
	            ☰
	
	        </div>
	
	        <div class="right-top">
	
	            <button
	                class="logout-btn"
	                onclick="logout()">
	
	                Logout
	
	            </button>
	
	        </div>
	
	    </div>
	
	
	  <div class="table-container">

<div class="table-title">
History Aset Emas
</div>

<div class="table-wrapper">

<table class="history-table">

<thead>

<tr>

<th>No</th>
<th>Hari / Tanggal</th>
<th>Harga Beli</th>
<th>Biaya Pembelian</th>
<th>Total Modal</th>
<th>Aset</th>
<th>Total Aset</th>
<th>Harga Jual</th>
<th>Jumlah Uang di Aplikasi</th>
<th>Untung/Rugi</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div
class="pagination"
id="pagination"
></div>

</div>
	
	    </div>
	
	</main>

</div>

<script>
	const profitLossCells = document.querySelectorAll('.profit-loss');

		profitLossCells.forEach(cell => {

			const text = cell.textContent.trim();

			if(text.includes('-')){
				cell.classList.add('loss');
			} else {
				cell.classList.add('profit');
			}

	});
	
	const toggleBtn = document.getElementById('toggleSidebar');
	const sidebar = document.getElementById('sidebar');
	const overlay = document.getElementById('overlay');

	toggleBtn.addEventListener('click', () => {

		if(window.innerWidth <= 768){
			sidebar.classList.toggle('show');
			overlay.classList.toggle('show');
		} else {
			sidebar.classList.toggle('hide');
		}

	});

	overlay.addEventListener('click', () => {

		sidebar.classList.remove('show');
		overlay.classList.remove('show');

	});
	
	function logout(){
		// kalau pakai login sederhana, langsung redirect
		window.location.href = "login.html";
	}

	const tbody =
	document.getElementById(
	"tableBody"
	);
	
	const data = [];
	
	tbody.innerHTML =
	data.length
	? data.map(
	(item,index)=>{
	
	const className =
	item.untung_rugi >= 0
	? "profit"
	: "loss";
	
	return `
	<tr>
	
	<td>
	${index+1}
	</td>
	
	<td>
	${item.tanggal}
	</td>
	
	<td>
	Rp ${Number(
	item.harga_beli
	).toLocaleString("id-ID")}
	</td>
	
	<td>
	Rp ${Number(
	item.biaya_pembelian
	).toLocaleString("id-ID")}
	</td>
	
	<td>
	Rp ${Number(
	item.total_modal
	).toLocaleString("id-ID")}
	</td>
	
	<td>
	${item.aset}
	</td>
	
	<td>
	${item.total_aset}
	</td>
	
	<td>
	Rp ${Number(
	item.harga_jual
	).toLocaleString("id-ID")}
	</td>
	
	<td>
	Rp ${Number(
	item.jumlah_uang_aplikasi
	).toLocaleString("id-ID")}
	</td>
	
	<td class="${className}">
	Rp ${Number(
	item.untung_rugi
	).toLocaleString("id-ID")}
	</td>
	
	</tr>
	`;
	
	}).join("")
	
	:
	
	`
	<tr>
	
	<td colspan="10">
	
	Belum ada data
	
	</td>
	
	</tr>
	`;

let allData=[];

let currentPage=1;

const rowsPerPage=10;



function formatRupiah(v){

return Number(
Math.round(v||0)
)
.toLocaleString(
"id-ID"
);

}


function formatGram(v){

return Number(
v||0
)
.toFixed(4)
.replace(".",",");

}


function formatTanggal(v){

return new Date(v)
.toLocaleDateString(
"id-ID",
{
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
}
);

}



function renderTable(){

const start=
(currentPage-1)
*
rowsPerPage;

const end=
start+
rowsPerPage;

const rows=
allData.slice(
start,
end
);

document
.getElementById(
"tableBody"
)
.innerHTML=

rows.map(
(item,index)=>`

<tr>

<td>
${start+index+1}
</td>

<td>
${formatTanggal(
item.tanggal_aset
)}
</td>

<td>
Rp ${formatRupiah(item.harga_beli)}
</td>

<td>
Rp ${formatRupiah(item.biaya_pembelian)}
</td>

<td>
Rp ${formatRupiah(item.total_modal)}
</td>

<td>
${formatGram(item.aset)}
</td>

<td>
${formatGram(item.total_aset)}
</td>

<td>
Rp ${formatRupiah(item.harga_jual)}
</td>

<td>
Rp ${formatRupiah(item.jumlah_uang_aplikasi)}
</td>

<td
class="${
item.untung_rugi>=0
?
"profit"
:
"loss"
}"
>

Rp ${formatRupiah(
item.untung_rugi
)}

</td>

</tr>

`

).join("");

renderPagination();

}



function renderPagination(){

const total=
Math.ceil(
allData.length
/
rowsPerPage
);

const div=
document
.getElementById(
"pagination"
);

div.innerHTML="";


for(
let i=1;
i<=total;
i++
){

div.innerHTML+=`

<button

class="${
i===currentPage
?
"active"
:
""
}"

onclick="
changePage(
${i}
)
"

>

${i}

</button>

`;

}

}



function changePage(page){

currentPage=
page;

renderTable();

}



async function loadData(){

await fetch(
"/api/generate-data-aset"
);

const res=
await fetch(
"/api/data-aset"
);

allData=
await res.json();


// terbaru di page 1
allData.sort(

(a,b)=>

new Date(
b.tanggal_aset
)

-

new Date(
a.tanggal_aset
)

);

renderTable();

}


loadData();

	
</script>


</body>
</html>
